<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RedBird Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="header">
        <div class="balance-container">
            <span class="coin-icon">🪙</span>
            <span id="balance">0</span>
        </div>
        <div class="stats-row">
            <div class="stat-item">⚡ <span id="pph">0</span>/час</div>
            <div class="stat-item">👆 <span id="ppc">1</span>/клик</div>
        </div>
    </div>

    <!-- Раздел ИГРЫ -->
    <div id="tab-game" class="screen active">
        <div class="bet-section">
            <label>💰 Ставка:</label>
            <div class="bet-controls">
                <button class="bet-btn" onclick="changeBet(-10)">-10</button>
                <input type="number" id="bet-amount" value="10" min="1" max="1000">
                <button class="bet-btn" onclick="changeBet(10)">+10</button>
            </div>
            <div class="bet-info">
                <span>Выигрыш: x2</span>
                <span id="potential-win">20</span>
            </div>
        </div>

        <div class="mascot-container" id="click-area">
            <div class="rocket-wrapper">
                <img src="https://cdn-icons-png.flaticon.com/512/1356/1356894.png" alt="Rocket" class="rocket-image" id="rocket">
                <div class="rocket-flame" id="flame"></div>
            </div>
            <div class="click-effect" id="click-effect"></div>
        </div>
        
        <div class="energy-container">
            <div style="text-align:center; margin-bottom:5px;">
                ⚡ Энергия: <span id="energy-text">1000/1000</span>
            </div>
            <div class="energy-bar-bg">
                <div class="energy-bar-fill" id="energy-bar"></div>
            </div>
        </div>

        <div class="game-result" id="game-result"></div>
    </div>

    <!-- Раздел БУСТЫ -->
    <div id="tab-upgrades" class="screen">
        <h2>🚀 Улучшения</h2>
        <div class="upgrades-list" id="upgrades-list">
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="upgrade-name">💪 Сильный клик</span>
                    <span class="upgrade-desc">+1 к клику</span>
                </div>
                <button class="buy-btn" onclick="buyUpgrade('click', 100)">Купить (100🪙)</button>
            </div>
            <div class="upgrade-item">
                <div class="upgrade-info">
                    <span class="upgrade-name">⚡ Быстрая энергия</span>
                    <span class="upgrade-desc">+100 энергии</span>
                </div>
                <button class="buy-btn" onclick="buyUpgrade('energy', 50)">Купить (50🪙)</button>
            </div>
        </div>
    </div>

    <!-- Раздел КОСТЮМЫ -->
    <div id="tab-costumes" class="screen">
        <h2>👔 Костюмы</h2>
        <p style="text-align:center; color:#888;">Скоро...</p>
    </div>

    <!-- Нижняя навигация -->
    <div class="bottom-nav">
        <button class="nav-btn active" data-tab="game">🎮 Игра</button>
        <button class="nav-btn" data-tab="upgrades">🚀 Бусты</button>
        <button class="nav-btn" data-tab="costumes">👔 Костюмы</button>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
